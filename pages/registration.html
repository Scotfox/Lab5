<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Реєстрація студента - Лаба 5</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f9f9f9;
      }
      nav ul {
        list-style-type: none;
        padding: 0;
      }
      nav ul li {
        display: inline;
        margin-right: 15px;
      }
      section {
        background-color: #ffffff;
        border: 1px solid #cccccc;
        padding: 20px;
        max-width: 600px;
      }
      fieldset {
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Лабораторна робота 5 - Форми</h1>
      <nav>
        <ul>
          <li><a href="../index.html">Головна</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Реєстрація студента</h2>

        <form action="#" method="POST">
          <p>
            <label for="lastname">ПІБ:</label><br />
            <input type="text" id="lastname" name="lastname" required />
          </p>

          <p>
            <label for="email">Електронна пошта:</label><br />
            <input type="email" id="email" name="email" required />
          </p>

          <p>
            <label for="pwd">Пароль (мінімум 8 символів):</label><br />
            <input
              type="password"
              id="pwd"
              name="password"
              minlength="8"
              required
            />
          </p>

          <p>
            <label for="dob">Дата народження:</label><br />
            <input type="date" id="dob" name="dob" required />
          </p>

          <fieldset>
            <legend>Стать:</legend>
            <input
              type="radio"
              id="gender_m"
              name="gender"
              value="male"
              required
            />
            <label for="gender_m">Чоловіча</label>

            <input
              type="radio"
              id="gender_f"
              name="gender"
              value="female"
              required
            />
            <label for="gender_f">Жіноча</label>
          </fieldset>

          <p>
            <label for="faculty">Факультет:</label><br />
            <select id="faculty" name="faculty" required>
              <option value="" disabled selected>
                -- Оберіть факультет --
              </option>
              <option value="kn">Комп'ютерні науки</option>
              <option value="kb">Кібербезпека</option>
              <option value="pm">Прикладна математика</option>
            </select>
          </p>

          <p>
            <label for="bio">Додаткова інформація:</label><br />
            <textarea id="bio" name="bio" rows="4" cols="40"></textarea>
          </p>

          <p>
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">Я даю згоду на обробку персональних даних</label>
          </p>

          <p>
            <button type="submit">Зареєструватися</button>
            <button type="reset">Очистити форму</button>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
